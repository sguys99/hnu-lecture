<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 세미나 Q&A</title>
  <meta name="description" content="대학원생 대상 AI 세미나에서 수집한 19개 질문과 답변 모음" />

  <!-- 테마 부트스트랩: 페인트 전 저장값 적용(FOUC 방지). 저장값 없으면 prefers-color-scheme 폴백 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <!-- Pretendard (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />

  <!-- 스타일 (상대 경로) -->
  <link rel="stylesheet" href="./styles.css?v=20260621c" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">AI 세미나 Q&amp;A</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크 모드로 전환">
          <!-- 라이트: 해(현재 모드 표시) / 다크: 달 — 표시 전환은 CSS가 담당 -->
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" /><path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" /><path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" />
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" focusable="false">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main id="app">
    <!-- 메인 뷰 / 상세 뷰가 app.js에 의해 렌더링됩니다 -->
  </main>

  <footer class="site-footer">
    <p>AI 세미나 Q&amp;A</p>
  </footer>

  <!-- 모바일 하단 탭바 (참조 BottomTabBar) — 모바일에서만 표시 -->
  <nav class="bottom-tab-bar" aria-label="하단 내비게이션">
    <a id="tab-feed" class="bottom-tab is-active" href="#/" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><path d="M9 22V12h6v10" />
      </svg>
      <span class="bottom-tab__label">피드</span>
    </a>
    <button id="tab-search" class="bottom-tab" type="button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />
      </svg>
      <span class="bottom-tab__label">검색</span>
    </button>
  </nav>

  <!-- 로직 (상대 경로) -->
  <script src="./app.js?v=20260621c" defer></script>
</body>
</html>
